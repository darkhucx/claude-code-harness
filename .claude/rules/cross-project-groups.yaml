# cross-project-groups.yaml
#
# Purpose:
#   Phase 65.3 (Cross-Project Group + 3-Layer Redaction) で導入された
#   横断プロジェクト検索の対象グループ定義。
#   harness-plan-brief / harness-accept / harness-progress skill から
#   --cross-project-group <name> flag で opt-in 利用される。
#
# Schema: cross-project-group.v1
#   {schema_version, groups: [{name, members[], description?}]}
#
# Default:
#   groups: []  ← 横断検索は無効化 (明示的な opt-in)
#
# Update Rules:
#   1. group は明示的に opt-in、default 空 (誤って横断検索が走らないよう)
#   2. groups[].name は groups 内で unique
#   3. groups[].members 内の要素は unique (重複不可)
#   4. 不正な schema は scripts/load-cross-project-groups.sh が exit 1
#   5. 詳細仕様: docs/cross-project-groups-schema.md
#
# Cross-Project Search Flow (D43 Option α):
#   client (skill) → load-cross-project-groups.sh で yaml → JSON 化
#   → 各 member project に対して mcp__harness__harness_mem_search を
#     1 回ずつ発行 (MCP に projects 配列が無いため N-call 必須)
#   → client 側で結果をマージ・dedupe・relevance_score sort
#   → Layer 2 (dict + NER) と Layer 3 (final scan) で固有名詞 redact
#

schema_version: cross-project-group.v1

groups: []

